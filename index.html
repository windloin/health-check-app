<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>移工健檢行動中心</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#209362">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Heiti TC", "Microsoft JhengHei", sans-serif; background-color: #f2f7f4; margin: 0; padding: 0; color: #333; }
        
        /* 標題列：左側刷新，右側日曆 */
        .header { background-color: #209362; color: white; padding: 15px; font-size: 18px; font-weight: bold; text-align: center; position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
        .header-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 12px; border-radius: 8px; font-size: 16px; cursor: pointer; }
        
        .alert-box { background-color: #ffeb3b; padding: 10px; font-size: 13px; font-weight: bold; text-align: center; color: #000; position: sticky; top: 52px; z-index: 99; border-bottom: 2px solid #fbc02d; line-height: 1.5; }
        .container { padding: 12px; }
        .section-title { font-size: 16px; font-weight: bold; color: #209362; margin: 15px 0 10px 5px; display: flex; justify-content: space-between; align-items: center; }

        /* 卡片設計：直接顯示三方電話 */
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); border-top: 6px solid #209362; }
        .card h3 { margin: 0 0 10px 0; font-size: 20px; color: #209362; border-bottom: 1px solid #eee; padding-bottom: 8px; }
        .info-row { display: flex; margin-bottom: 6px; font-size: 14px; }
        .label { color: #7f8c8d; min-width: 90px; font-weight: bold; }
        .value { color: #2c3e50; flex: 1; font-weight: 500; }
        .phone-link { color: #209362; text-decoration: none; font-weight: bold; border-bottom: 1px dashed #209362; }
        
        .input-field { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 14px; margin-top: 5px; box-sizing: border-box; background: #fff; }
        .btn-report { width: 100%; background-color: #209362; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; margin-top: 10px; font-size: 15px; }
        .btn-group-sub { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn-sub { padding: 12px; border-radius: 8px; border: none; font-weight: bold; font-size: 14px; text-decoration: none; text-align: center; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .btn-line { background-color: #06C755; color: white; }
        .btn-map { background-color: #f1f3f4; color: #333; }

        /* 下方已完成清單 */
        .done-card { background: white; border-radius: 8px; padding: 12px; margin-bottom: 10px; border-left: 5px solid #6c757d; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .done-name { font-weight: bold; color: #333; }
        .done-date { font-size: 12px; color: #888; }

        /* 日曆彈窗 */
        #calendar-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 85%; max-width: 350px; border-radius: 15px; padding: 20px; position: relative; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .cal-day { padding: 10px 0; border-radius: 50%; font-size: 14px; cursor: pointer; position: relative; }
        .has-event::after { content: ''; position: absolute; bottom: 5px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; background: #e74c3c; border-radius: 50%; }
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-weight: bold; color: #209362; }
        .close-cal { background: #eee; border: none; width: 100%; padding: 10px; border-radius: 8px; margin-top: 15px; font-weight: bold; }

        #loading { text-align: center; padding: 30px; font-weight: bold; color: #7f8c8d; }
        .filter-tag { background: #e8f5e9; padding: 8px; border-radius: 5px; font-size: 13px; color: #2e7d32; display: none; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="header">
        <button class="header-btn" onclick="fetchData()">🔄 刷新</button>
        <span>🏥 健檢協調中心</span>
        <button class="header-btn" onclick="openCalendar()">📅 日曆</button>
    </div>
    <div class="alert-box">🚨 務必帶手機、護照+居留證正本、健保卡<br>請提前 10 分鐘於接送位置等待</div>

    <div class="container">
        <div id="filter-info" class="filter-tag">
            正在顯示：<span id="current-date"></span> 
            <button onclick="clearFilter()" style="border:none; background:none; color:blue; text-decoration:underline; float:right;">清除</button>
        </div>

        <div class="section-title">📅 待辦排程 <span id="active-count" style="font-size:12px; background:#209362; color:white; padding:2px 8px; border-radius:10px;">0</span></div>
        <div id="active-list"><div id="loading">載入資料中...</div></div>

        <div class="section-title" style="margin-top:40px; color:#6c757d;">✅ 近期已完成回報</div>
        <div id="completed-list"></div>
    </div>

    <div id="calendar-modal">
        <div class="modal-content">
            <div class="cal-header"><span id="cal-title"></span></div>
            <div class="calendar-grid" style="font-size:12px; color:#999; margin-bottom:10px;">
                <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
            </div>
            <div class="calendar-grid" id="cal-days"></div>
            <button class="close-cal" onclick="closeCalendar()">關閉日曆</button>
        </div>
    </div>
