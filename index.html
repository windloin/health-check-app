<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>移工健檢行動中心</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#209362">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Heiti TC", "Microsoft JhengHei", sans-serif; background-color: #f2f7f4; margin: 0; padding: 0; color: #333; }
        
        /* 標題列 */
        .header { background-color: #209362; color: white; padding: 15px; font-size: 18px; font-weight: bold; text-align: center; position: sticky; top: 0; z-index: 100; display: flex; justify-content: center; align-items: center; }
        .refresh-icon { position: absolute; left: 15px; font-size: 20px; cursor: pointer; }
        
        .alert-box { background-color: #ffeb3b; padding: 10px; font-size: 13px; font-weight: bold; text-align: center; color: #000; border-bottom: 2px solid #fbc02d; line-height: 1.5; }
        
        /* 快捷篩選列 */
        .filter-bar { display: flex; background: white; padding: 10px; gap: 8px; position: sticky; top: 52px; z-index: 98; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .filter-btn { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #209362; background: white; color: #209362; font-weight: bold; font-size: 14px; cursor: pointer; text-align: center; }
        .filter-btn.active { background: #209362; color: white; }
        
        .container { padding: 12px; }
        .section-title { font-size: 16px; font-weight: bold; color: #209362; margin: 10px 0 10px 5px; display: flex; justify-content: space-between; align-items: center; }

        /* 卡片樣式 */
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); border-top: 6px solid #209362; }
        .card h3 { margin: 0 0 10px 0; font-size: 20px; color: #209362; border-bottom: 1px solid #eee; padding-bottom: 8px; }
        .info-row { display: flex; margin-bottom: 6px; font-size: 14px; }
        .label { color: #7f8c8d; min-width: 90px; font-weight: bold; }
        .value { color: #2c3e50; flex: 1; font-weight: 500; }
        .phone-link { color: #209362; text-decoration: none; font-weight: bold; border-bottom: 1px dashed #209362; }
        
        .input-field { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 14px; margin-top: 5px; box-sizing: border-box; }
        .btn-report { width: 100%; background-color: #209362; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; margin-top: 10px; font-size: 15px; }
        
        .btn-group-sub { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn-sub { padding: 12px; border-radius: 8px; border: none; font-weight: bold; font-size: 14px; text-decoration: none; text-align: center; display: flex; align-items: center; justify-content: center; }
        .btn-line { background-color: #06C755; color: white; }
        .btn-map { background-color: #f1f3f4; color: #333; }

        .done-card { background: #fff; border-radius: 8px; padding: 12px; margin-bottom: 10px; border-left: 5px solid #6c757d; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; }
        .done-name { font-weight: bold; color: #333; }
        .done-time { font-size: 12px; color: #888; }

        /* 日曆彈窗 */
        #calendar-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 85%; max-width: 350px; border-radius: 15px; padding: 20px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .cal-day { padding: 10px 0; border-radius: 50%; font-size: 14px; cursor: pointer; position: relative; }
        .has-event::after { content: ''; position: absolute; bottom: 5px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; background: #e74c3c; border-radius: 50%; }
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-weight: bold; color: #209362; }
        .close-cal { background: #eee; border: none; width: 100%; padding: 10px; border-radius: 8px; margin-top: 15px; font-weight: bold; }

        #loading { text-align: center; padding: 30px; font-weight: bold; color: #7f8c8d; }
        .current-filter-info { font-size: 13px; color: #209362; padding: 5px 12px; background: #e8f5e9; border-radius: 20px; font-weight: bold; display: none; }
    </style>
</head>
<body>
    <div class="header">
        <span class="refresh-icon" onclick="fetchData()">🔄</span>
        <span>🏥 健檢行動協調中心</span>
    </div>
    <div class="alert-box">🚨 務必帶手機、護照+居留證正本、健保卡<br>請提前 10 分鐘於接送位置等待</div>

    <div class="filter-bar">
        <div class="filter-btn active" id="btn-today" onclick="filterToday()">今日任務</div>
        <div class="filter-btn" id="btn-all" onclick="filterAll()">全部任務</div>
        <div class="filter-btn" id="btn-cal" onclick="openCalendar()">📅 日期</div>
    </div>

    <div class="container">
        <div class="section-title">
            <span>📅 排程清單</span>
            <span id="current-tag" class="current-filter-info"></span>
        </div>
        <div id="active-list"><div id="loading">載入中...</div></div>

        <div class="section-title" style="margin-top:30px; color:#6c757d;">✅ 近期已完成回報</div>
        <div id="completed-list"></div>
    </div>

    <div id="calendar-modal">
        <div class="modal-content">
            <div class="cal-header"><span id="cal-title"></span></div>
            <div class="calendar-grid" style="font-size:12px; color:#999; margin-bottom:10px;">
                <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
            </div>
            <div class="calendar-grid" id="cal-days"></div>
            <button class="close-cal" onclick="closeCalendar()">取消</button>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbzMf5u2CMRAOl8G51kzxDXcImcsdHC89sRMNO2xPfA_IJMxE8XbSAHG_13YrYivlYpf/exec';
        let allData = [];
        let currentMode = 'today'; // today, all, custom

        async function fetchData() {
            try {
                document.getElementById('active-list').innerHTML = '<div id="loading">連線中...</div>';
                const res = await fetch(API_URL);
                allData = await res.json();
                
                // 根據當前模式渲染
                if(currentMode === 'today') filterToday();
                else if(currentMode === 'all') filterAll();
            } catch (e) { alert('載入失敗'); }
        }

        // 渲染畫面的核心函數
        function renderUI(filterDate = null) {
            const activeList = document.getElementById('active-list');
            const completedList = document.getElementById('completed-list');
            const tag = document.getElementById('current-tag');
            
            activeList.innerHTML = '';
            completedList.innerHTML = '';
            
            if(filterDate) {
                tag.innerText = filterDate;
                tag.style.display = 'inline-block';
            } else {
                tag.style.display = 'none';
            }

            allData.forEach(item => {
                const name = item['移工姓名'];
                const time = item['接送日及時間'] || '';
                const doneInfo = item['備註(找不到人)'] || '';

                if (item['狀態 (未完成/已完成)'] === '已完成') {
                    const div = document.createElement('div');
                    div.className = 'done-card';
                    div.innerHTML = `<span>✅ ${name}</span><span class="done-date">${doneInfo.replace('手機更新於 ','')}</span>`;
                    completedList.appendChild(div);
                } else {
                    // 篩選邏輯
                    if (filterDate && !time.startsWith(filterDate)) return;

                    const lineMsg = encodeURIComponent(`【健檢通知】\n移工：${name}\n工人手機：${item['工人手機'] || '無'}\n雇主：${item['雇主']}\n雇主手機：${item['雇主手機'] || '無'}\n司機：${item['司機姓名/電話'] || '未指派'}\n時間：${time}\n地址：${item['接送地址']}\n\n⚠️請提前10分鐘帶手機、護照+居留證正本、健保卡等待。`);

                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <h3>👤 ${name}</h3>
                        <div class="info-row"><div class="label">🏢 公司</div><div class="value">${item['公司名稱'] || '-'}</div></div>
                        <div class="info-row"><div class="label">👤 雇主</div><div class="value">${item['雇主'] || '-'}</div></div>
                        <div class="info-row"><div class="label">⏰ 時間</div><div class="value" style="color:red; font-weight:bold;">${time}</div></div>
                        <div class="info-row"><div class="label">📍 地址</div><div class="value">${item['接送地址']}</div></div>
                        <hr style="border:0; border-top:1px solid #f1f3f4; margin:10px 0;">
                        <div class="info-row"><div class="label">📱 工人</div><div class="value"><a href="tel:${item['工人手機']}" class="phone-link">${item['工人手機'] || '未填'}</a></div></div>
                        <div class="info-row"><div class="label">💼 雇主</div><div class="value"><a href="tel:${item['雇主手機']}" class="phone-link">${item['雇主手機'] || '未填'}</a></div></div>
                        <div class="info-row"><div class="label">🚛 司機</div><div class="value"><a href="tel:${item['司機姓名/電話']}" class="phone-link">${item['司機姓名/電話'] || '未填'}</a></div></div>
                        <div style="background:#f8f9fa; padding:10px; border-radius:8px; margin-top:10px;">
                            <input type="text" class="input-field" id="rep-${name}" placeholder="回報人姓名">
                            <select class="input-field" id="sel-${name}">
                                <option value="">-- 更新進度 --</option>
                                <option value="1.已通知(翻譯/業務)">1.已通知(翻譯/業務)</option>
                                <option value="2.已聯絡司機">2.已聯絡司機</option>
                                <option value="3.已上車">3.已上車</option>
                                <option value="4.體檢中">4.體檢中</option>
                                <option value="5.已完成">5.已完成</option>
                            </select>
                            <input type="text" class="input-field" id="rem-${name}" placeholder="備註狀況" value="${item['備註(找不到人)'] || ''}">
                            <button class="btn-report" onclick="doUpdate('${name}')">送出回報</button>
                        </div>
                        <div class="btn-group-sub">
                            <a href="https://line.me/R/share?text=${lineMsg}" class="btn-sub btn-line">💬 LINE 通知</a>
                            <button class="btn-sub btn-map" onclick="window.open('https://www.google.com/maps/dir/?api=1&destination=' + encodeURIComponent('${item['接送地址']}'))">🗺️ 導航</button>
                        </div>
                    `;
                    activeList.appendChild(card);
                }
            });
        }

        // 今日任務篩選
        function filterToday() {
            currentMode = 'today';
            setActiveBtn('btn-today');
            const today = new Date().toISOString().split('T')[0].replace(/-/g, '/'); // 轉為 2026/04/05 格式
            renderUI(today);
        }

        // 全部任務篩選
        function filterAll() {
            currentMode = 'all';
            setActiveBtn('btn-all');
            renderUI(null);
        }

        function setActiveBtn(id) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        async function doUpdate(name) {
            const reporter = document.getElementById(`rep-${name}`).value;
            const status = document.getElementById(`sel-${name}`).value;
            const remarks = document.getElementById(`rem-${name}`).value;
            if(!reporter) return alert('請填回報人姓名！');
            if(!confirm(`更新 ${name} 的進度？`)) return;
            document.getElementById('active-list').innerHTML = '<div id="loading">同步中...</div>';
            try {
                await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ name, status, remarks, reporter }) });
                alert('更新成功！');
                fetchData();
            } catch (e) { alert('更新失敗'); fetchData(); }
        }

        // 日曆彈窗
        function openCalendar() {
            document.getElementById('calendar-modal').style.display = 'flex';
            const grid = document.getElementById('cal-days');
            const now = new Date();
            const y = now.getFullYear();
            const m = now.getMonth();
            document.getElementById('cal-title').innerText = `${y}年 ${m + 1}月`;
            grid.innerHTML = '';
            const firstDay = new Date(y, m, 1).getDay();
            const lastDate = new Date(y, m + 1, 0).getDate();
            const eventDates = allData.filter(i => i['狀態 (未完成/已完成)'] !== '已完成').map(i => i['接送日及時間'].split(' ')[0]);
            for (let i = 0; i < firstDay; i++) grid.innerHTML += '<div></div>';
            for (let d = 1; d <= lastDate; d++) {
                const dateStr = `${y}/${String(m+1).padStart(2,'0')}/${String(d).padStart(2,'0')}`;
                const hasEvent = eventDates.includes(dateStr);
                const dayEl = document.createElement('div');
                dayEl.className = `cal-day ${hasEvent ? 'has-event' : ''}`;
                dayEl.innerText = d;
                dayEl.onclick = () => {
                    setActiveBtn('btn-cal');
                    renderUI(dateStr);
                    closeCalendar();
                };
                grid.appendChild(dayEl);
            }
        }
        function closeCalendar() { document.getElementById('calendar-modal').style.display = 'none'; }

        fetchData();
    </script>
</body>
</html>
