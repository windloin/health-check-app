<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>移工健檢行動中心</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f2f7f4; margin: 0; padding: 0; color: #333; }
        .header { background-color: #209362; color: white; padding: 15px; font-size: 18px; font-weight: bold; text-align: center; position: sticky; top: 0; z-index: 100; display: flex; justify-content: center; align-items: center; }
        .refresh-icon { position: absolute; left: 15px; font-size: 20px; cursor: pointer; }
        .alert-box { background-color: #ffeb3b; padding: 10px; font-size: 13px; font-weight: bold; text-align: center; color: #000; border-bottom: 2px solid #fbc02d; line-height: 1.5; }
        .filter-bar { display: flex; background: white; padding: 10px; gap: 8px; position: sticky; top: 52px; z-index: 98; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .filter-btn { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #209362; background: white; color: #209362; font-weight: bold; font-size: 14px; cursor: pointer; text-align: center; }
        .filter-btn.active { background: #209362; color: white; }
        .container { padding: 12px; }
        .section-title { font-size: 16px; font-weight: bold; color: #209362; margin: 20px 0 10px 5px; display: flex; justify-content: space-between; align-items: center; }
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); border-top: 6px solid #209362; }
        .status-badge { display: inline-block; padding: 3px 10px; border-radius: 15px; font-size: 11px; font-weight: bold; margin-bottom: 10px; background: #e8f5e9; color: #2e7d32; border: 1px solid #c3e6cb; }
        .card h3 { margin: 0 0 10px 0; font-size: 20px; color: #209362; border-bottom: 1px solid #eee; padding-bottom: 8px; }
        .info-row { display: flex; margin-bottom: 6px; font-size: 14px; }
        .label { color: #7f8c8d; min-width: 90px; font-weight: bold; }
        .value { color: #2c3e50; flex: 1; font-weight: 500; }
        .phone-link { color: #209362; text-decoration: none; font-weight: bold; }
        .input-field { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 14px; margin-top: 5px; box-sizing: border-box; }
        .btn-report { width: 100%; background-color: #209362; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; margin-top: 10px; font-size: 15px; cursor: pointer; }
        .btn-report:disabled { background-color: #bdc3c7 !important; }
        .btn-group-sub { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn-sub { padding: 12px; border-radius: 8px; border: none; font-weight: bold; font-size: 14px; text-decoration: none; text-align: center; display: flex; align-items: center; justify-content: center; }
        .btn-line { background-color: #06C755; color: white; }
        .btn-map { background-color: #f1f3f4; color: #333; }
        .done-card { background: #fff; border-radius: 8px; padding: 12px; margin-bottom: 10px; border-left: 5px solid #6c757d; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .done-time { font-size: 12px; color: #888; margin-top: 4px; }
        #calendar-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 85%; max-width: 350px; border-radius: 15px; padding: 20px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .cal-day { padding: 10px 0; border-radius: 50%; font-size: 14px; cursor: pointer; position: relative; }
        .has-event::after { content: ''; position: absolute; bottom: 5px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; background: #e74c3c; border-radius: 50%; }
        #loading { text-align: center; padding: 30px; font-weight: bold; color: #7f8c8d; }
    </style>
</head>
<body>

<div class="header">
    <span class="refresh-icon" onclick="fetchData()">🔄</span>
    <span>🏥 健檢行動協調中心</span>
</div>

<div class="alert-box">🚨 務必帶手機、護照+居留證正本、健保卡<br>請提前 10 分鐘於接送位置等待</div>

<div class="filter-bar">
    <div class="filter-btn active" id="btn-today" onclick="filterToday()">今日任務</div>
    <div class="filter-btn" id="btn-all" onclick="filterAll()">全部任務</div>
    <div class="filter-btn" id="btn-cal" onclick="openCalendar()">📅 選擇日期</div>
</div>

<div class="container">
    <div class="section-title">📅 排程清單 <span id="current-tag" style="font-size:12px
