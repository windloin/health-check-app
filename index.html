<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>移工健檢行動中心</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f2f7f4; margin: 0; padding: 0; color: #333; }
        .header { background-color: #209362; color: white; padding: 15px; font-size: 18px; font-weight: bold; text-align: center; position: sticky; top: 0; z-index: 100; display: flex; justify-content: center; align-items: center; }
        .refresh-icon { position: absolute; left: 15px; font-size: 20px; cursor: pointer; }
        .alert-box { background-color: #ffeb3b; padding: 10px; font-size: 13px; font-weight: bold; text-align: center; line-height: 1.5; }
        .filter-bar { display: flex; background: white; padding: 10px; gap: 8px; position: sticky; top: 52px; z-index: 98; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .filter-btn { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #209362; background: white; color: #209362; font-weight: bold; font-size: 14px; text-align: center; }
        .filter-btn.active { background: #209362; color: white; }
        .container { padding: 12px; }
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); border-top: 6px solid #209362; }
        .status-badge { display: inline-block; padding: 3px 10px; border-radius: 15px; font-size: 11px; font-weight: bold; margin-bottom: 10px; background: #e8f5e9; color: #2e7d32; }
        .info-row { display: flex; margin-bottom: 6px; font-size: 14px; }
        .label { color: #7f8c8d; min-width: 90px; font-weight: bold; }
        .value { color: #2c3e50; flex: 1; font-weight: 500; }
        .phone-link { color: #209362; text-decoration: none; font-weight: bold; border-bottom: 1px dashed #209362; }
        .input-field { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 14px; margin-top: 5px; box-sizing: border-box; background: #fff; }
        .btn-report { width: 100%; background-color: #209362; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .btn-report:disabled { background-color: #bdc3c7; }
        .btn-photo { width: 100%; background-color: #3498db; color: white; border: none; padding: 10px; border-radius: 8px; font-weight: bold; margin-top: 10px; margin-bottom: 10px; }
        .btn-group-sub { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn-sub { padding: 12px; border-radius: 8px; border: none; font-weight: bold; font-size: 14px; text-decoration: none; text-align: center; display: flex; align-items: center; justify-content: center; }
        .btn-line { background-color: #06C755; color: white; }
        .btn-map { background-color: #f1f3f4; color: #333; }
        .done-card { background: #fff; border-radius: 8px; padding: 12px; margin-bottom: 10px; border-left: 5px solid #6c757d; display: flex; justify-content: space-between; align-items: center; }
        #calendar-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 85%; max-width: 350px; border-radius: 15px; padding: 20px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .cal-day { padding: 10px 0; border-radius: 50%; font-size: 14px; cursor: pointer; position: relative; }
        .has-event::after { content: ''; position: absolute; bottom: 5px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; background: #e74c3c; border-radius: 50%; }
    </style>
</head>
<body>
    <div class="header"><span class="refresh-icon" onclick="fetchData()">🔄</span><span>🏥 健檢行動協調中心</span></div>
    <div class="alert-box">🚨 務必帶手機、護照+居留證正本、健保卡<br>請提前 10 分鐘於接送位置等待</div>
    <div class="filter-bar">
        <div class="filter-btn active" id="btn-today" onclick="filterToday()">今日任務</div>
        <div class="filter-btn" id="btn-all" onclick="filterAll()">全部任務</div>
        <div class="filter-btn" id="btn-cal" onclick="openCalendar()">📅 日期</div>
    </div>
    <div class="container">
        <div id="active-list"><div id="loading" style="text-align:center; padding:20px;">載入中...</div></div>
        <div style="font-weight:bold; color:#6c757d; margin: 20px 0 10px 5px;">✅ 近期已完成</div>
        <div id="completed-list"></div>
    </div>

    <div id="calendar-modal"><div class="modal-content"><div id="cal-title" style="text-align:center; font-weight:bold; margin-bottom:15px;"></div><div class="calendar-grid" style="font-size:12px; color:#999; margin-bottom:10px;"><div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div></div><div class="calendar-grid" id="cal-days"></div><button onclick="closeCalendar()" style="width:100%; margin-top:15px; padding:10px; border-radius:8px; border:none; background:#eee; font-weight:bold;">取消</button></div></div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbzMf5u2CMRAOl8G51kzxDXcImcsdHC89sRMNO2xPfA_IJMxE8XbSAHG_13YrYivlYpf/exec';
        let allData = [];
        let photoDataMap = {};
        let currentFilter = null;

        async function fetchData() {
            try {
                const res = await fetch(`${API_URL}?t=${new Date().getTime()}`);
                allData = await res.json();
                renderUI(currentFilter || getTodayStr());
            } catch (e) { alert('連線失敗'); }
        }

        function getTodayStr() { const n = new Date(); return n.getFullYear() + "-" + String(n.getMonth() + 1).padStart(2, '0') + "-" + String(n.getDate()).padStart(2, '0'); }

        function renderUI(filterDate = null) {
            currentFilter = filterDate;
            const activeList = document.getElementById('active-list');
            const completedList = document.getElementById('completed-list');
            activeList.innerHTML = ''; completedList.innerHTML = '';

            allData.forEach(item => {
                const id = item['ID']; const name = item['移工姓名']; const time = item['接送日及時間'] || '';
                const wPhone = item['工人手機'] || '無'; const ePhone = item['雇主手機'] || '無';

                if (item['狀態 (未完成/已完成)'] === '已完成') {
                    const div = document.createElement('div');
                    div.className = 'done-card';
                    div.innerHTML = `<b>✅ ${name}</b><span style="font-size:12px; color:#888;">${item['最後回報者'] || ''}</span>`;
                    completedList.appendChild(div);
                } else {
                    if (filterDate && !time.includes(filterDate)) return;
                    
                    const lineMsg = encodeURIComponent(`【健檢通知】\n移工：${name}\n工人手機：${wPhone}\n雇主：${item['雇主']}\n雇主手機：${ePhone}\n司機：${item['司機姓名/電話'] || '未填'}\n時間：${time}\n地址：${item['接送地址']}\n\n🚨 務必帶手機、護照+居留證正本、健保卡\n請提前 10 分鐘於接送位置等待`);

                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="status-badge">ID：${id} | ${item['目前狀態'] || '待處理'}</div>
                        <h3>👤 ${name}</h3>
                        <div class="info-row"><div class="label">⏰ 時間</div><div class="value" style="color:red; font-weight:bold;">${time}</div></div>
                        <div class="info-row"><div class="label">📍 地址</div><div class="value">${item['接送地址']}</div></div>
                        <div class="info-row"><div class="label">📱 工人</div><div class="value"><a href="tel:${wPhone}" class="phone-link">${wPhone}</a></div></div>
                        <div class="info-row"><div class="label">💼 雇主</div><div class="value"><a href="tel:${ePhone}" class="phone-link">${ePhone}</a></div></div>
                        <div style="background:#f8f9fa; padding:10px; border-radius:8px; margin-top:10px;">
                            <input type="text" class="input-field" id="rep-${id}" placeholder="回報人姓名 (必填)">
                            <select class="input-field" id="sel-${id}"><option value="">-- 更新進度 --</option><option value="1.已通知">1.已通知</option><option value="2.已聯絡司機">2.已聯絡司機</option><option value="3.已上車">3.已上車</option><option value="4.體檢中">4.體檢中</option><option value="5.已完成">5.已完成</option></select>
                            <input type="file" id="file-${id}" accept="image/*" capture="camera" style="display:none;" onchange="compressImage('${id}')">
                            <button class="btn-photo" onclick="document.getElementById('file-${id}').click()">📸 拍收據 / 現場照</button>
                            <div id="pre-${id}" style="display:none; font-size:12px; color:blue; text-align:center; margin-bottom:5px;">✅ 照片縮圖已就緒</div>
                            <input type="text" class="input-field" id="rem-${id}" placeholder="備註狀況">
                            <button class="btn-report" id="btn-${id}" onclick="doUpdate('${id}', '${name}')">確認送出回報</button>
                        </div>
                        <div class="btn-group-sub">
                            <a href="https://line.me/R/share?text=${lineMsg}" class="btn-sub btn-line">💬 LINE 通知</a>
                            <button class="btn-sub btn-map" onclick="window.open('https://www.google.com/maps/dir/?api=1&destination=' + encodeURIComponent('${item['接送地址']}'))">🗺️ 導航</button>
                        </div>`;
                    activeList.appendChild(card);
                }
            });
        }

        function compressImage(id) {
            const file = document.getElementById(`file-${id}`).files[0];
            const reader = new FileReader(); reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image(); img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
                    const maxWidth = 600; 
                    const scale = maxWidth / img.width;
                    canvas.width = maxWidth; canvas.height = img.height * scale;
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    photoDataMap[id] = canvas.toDataURL('image/jpeg', 0.6);
                    document.getElementById(`pre-${id}`).style.display = 'block';
                };
            };
        }

        async function doUpdate(id, name) {
            const reporter = document.getElementById(`rep-${id}`).value;
            const status = document.getElementById(`sel-${id}`).value;
            const remarks = document.getElementById(`rem-${id}`).value;
            const photoData = photoDataMap[id] || null;
            if(!reporter || !status) return alert('請填姓名與進度！');
            const btn = document.getElementById(`btn-${id}`); 
            btn.disabled = true; 
            btn.innerText = photoData ? '正在傳送照片與資料(較慢)...' : '同步中...';
            
            try {
                await fetch(API_URL, { 
                    method: 'POST', 
                    mode: 'no-cors', 
                    body: JSON.stringify({ id, name, status, remarks, reporter, photoData }) 
                });
                const waitTime = photoData ? 4000 : 1500;
                setTimeout(() => { 
                    alert(photoData ? '✅ 照片與資料上傳成功！' : '回報成功！'); 
                    photoDataMap[id] = null; 
                    fetchData(); 
                }, waitTime);
            } catch (e) { alert('更新失敗'); btn.disabled = false; }
        }

        function filterToday() { document.getElementById('btn-today').classList.add('active'); document.getElementById('btn-all').classList.remove('active'); renderUI(getTodayStr()); }
        function filterAll() { document.getElementById('btn-all').classList.add('active'); document.getElementById('btn-today').classList.remove('active'); renderUI(null); }
        function openCalendar() {
            document.getElementById('calendar-modal').style.display = 'flex';
            const grid = document.getElementById('cal-days'); const n = new Date(); const y = n.getFullYear(); const m = n.getMonth();
            document.getElementById('cal-title').innerText = `${y}年 ${m+1}月`; grid.innerHTML = '';
            const firstDay = new Date(y, m, 1).getDay(); const lastDate = new Date(y, m + 1, 0).getDate();
            const eventDates = allData.filter(i => i['狀態 (未完成/已完成)'] !== '已完成').map(i => i['接送日及時間'].split(' ')[0]);
            for (let i = 0; i < firstDay; i++) grid.innerHTML += '<div></div>';
            for (let d = 1; d <= lastDate; d++) {
                const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const hasEvent = eventDates.some(ed => ed.includes(dateStr));
                const dayEl = document.createElement('div'); dayEl.className = `cal-day ${hasEvent ? 'has-event' : ''}`; dayEl.innerText = d;
                dayEl.onclick = () => { currentFilter = dateStr; renderUI(dateStr); closeCalendar(); };
                grid.appendChild(dayEl);
            }
        }
        function closeCalendar() { document.getElementById('calendar-modal').style.display = 'none'; }
        fetchData();
    </script>
</body>
</html>
