<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>移工健檢行動中心</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#209362">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Heiti TC", "Microsoft JhengHei", sans-serif; background-color: #f2f7f4; margin: 0; padding: 0; color: #333; }
        .header { background-color: #209362; color: white; padding: 15px; font-size: 18px; font-weight: bold; text-align: center; position: sticky; top: 0; z-index: 100; }
        .alert-box { background-color: #ffeb3b; padding: 10px; font-size: 14px; font-weight: bold; text-align: center; color: #000; border-bottom: 2px solid #fbc02d; position: sticky; top: 52px; z-index: 99; }
        .container { padding: 12px; }
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); border-top: 6px solid #209362; }
        .status-badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; margin-bottom: 10px; background: #e0e0e0; }
        .card h3 { margin: 0 0 12px 0; font-size: 20px; color: #209362; border-bottom: 1px solid #eee; padding-bottom: 8px; }
        .info-row { display: flex; margin-bottom: 8px; font-size: 14px; }
        .label { color: #7f8c8d; min-width: 95px; font-weight: bold; }
        .value { color: #2c3e50; flex: 1; font-weight: 500; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn { padding: 12px; border-radius: 8px; border: none; font-weight: bold; font-size: 14px; cursor: pointer; text-align: center; display: flex; align-items: center; justify-content: center; text-decoration: none; }
        .btn-line { background-color: #06C755; color: white; }
        .btn-update { background-color: #209362; color: white; }
        .btn-map { background-color: #f1f3f4; color: #333; grid-column: span 2; }
        #loading { text-align: center; padding: 30px; font-weight: bold; color: #7f8c8d; }
    </style>
</head>
<body>
    <div class="header">🏥 健檢行動協調中心</div>
    <div class="alert-box">🚨 必帶居留證正本 + 健保卡</div>
    <div class="container"><div id="card-container"><div id="loading">連線中... ⏳</div></div></div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbzMf5u2CMRAOl8G51kzxDXcImcsdHC89sRMNO2xPfA_IJMxE8XbSAHG_13YrYivlYpf/exec';

        async function fetchData() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                const container = document.getElementById('card-container');
                container.innerHTML = '';

                data.forEach(item => {
                    if(item['狀態 (未完成/已完成)'] === '已完成') return;

                    // 處理時間：去掉 T 和秒數
                    let displayTime = item['接送日及時間'] || '-';
                    if(displayTime.includes('T')) {
                        displayTime = displayTime.split('.')[0].replace('T', ' ').substring(0, 16);
                    }

                    // 製作包含完整資訊的 LINE 分享訊息
                    const lineMsg = encodeURIComponent(
                        `【健檢通知】\n` +
                        `移工姓名：${item['移工姓名'] || '-'}\n` +
                        `工人手機：${item['工人手機'] || '-'}\n` +
                        `公司名稱：${item['公司名稱'] || '-'}\n` +
                        `雇主：${item['雇主'] || '-'}\n` +
                        `雇主手機：${item['雇主手機'] || '-'}\n` +
                        `接送時間：${displayTime}\n` +
                        `接送地址：${item['接送地址'] || '-'}\n` +
                        `請協助提醒務必帶居留證+健保卡。`
                    );

                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="status-badge" style="background:${item['目前狀態'] ? '#d4edda' : '#eee'}">
                            📍 目前狀態：${item['目前狀態'] || '待處理'}
                        </div>
                        <h3>👤 ${item['移工姓名']}</h3>
                        <div class="info-row"><div class="label">🏢 公司名稱</div><div class="value">${item['公司名稱'] || '-'}</div></div>
                        <div class="info-row"><div class="label">👤 雇主名稱</div><div class="value">${item['雇主'] || '-'}</div></div>
                        <div class="info-row"><div class="label">⏰ 接送時間</div><div class="value" style="color:red; font-weight:bold;">${displayTime}</div></div>
                        <div class="info-row"><div class="label">📍 接送地址</div><div class="value">${item['接送地址'] || '-'}</div></div>
                        <div class="info-row"><div class="label">🚌 司機資訊</div><div class="value">${item['司機姓名/電話'] || '未指派'}</div></div>
                        
                        <div class="btn-group">
                            <a href="https://line.me/R/share?text=${lineMsg}" class="btn btn-line">💬 LINE 通知</a>
                            <button class="btn btn-update" onclick="doUpdate('${item['移工姓名']}', '3.已上車')">🚌 確認上車</button>
                            <button class="btn btn-update" onclick="doUpdate('${item['移工姓名']}', '已完成')">✅ 體檢完成</button>
                            <button class="btn btn-map" onclick="window.open('https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(item['接送地址'])}')">🗺️ 導航地址</button>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (e) { console.error(e); }
        }

        async function doUpdate(name, status) {
            if(!confirm(`確定要標記「${name}」為 ${status} 嗎？`)) return;
            document.getElementById('card-container').innerHTML = '<div id="loading">更新中... 🚀</div>';
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ name: name, status: status })
                });
                alert('回報成功！');
                setTimeout(fetchData, 1000); // 1秒後重整
            } catch (e) {
                alert('更新失敗，請檢查網路！');
                fetchData();
            }
        }
        fetchData();
    </script>
</body>
</html>
