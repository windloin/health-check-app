<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>移工健檢行動中心</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#209362">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Heiti TC", "Microsoft JhengHei", sans-serif; background-color: #f2f7f4; margin: 0; padding: 0; color: #333; }
        .header { background-color: #209362; color: white; padding: 15px; font-size: 18px; font-weight: bold; text-align: center; position: sticky; top: 0; z-index: 100; }
        .alert-box { background-color: #ffeb3b; padding: 10px; font-size: 14px; font-weight: bold; text-align: center; color: #000; position: sticky; top: 52px; z-index: 99; border-bottom: 2px solid #fbc02d; }
        .container { padding: 12px; }
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); border-top: 6px solid #209362; }
        .card h3 { margin: 0 0 12px 0; font-size: 20px; color: #209362; border-bottom: 1px solid #eee; padding-bottom: 8px; }
        .info-row { display: flex; margin-bottom: 8px; font-size: 14px; }
        .label { color: #7f8c8d; min-width: 95px; font-weight: bold; }
        .value { color: #2c3e50; flex: 1; font-weight: 500; }
        .status-select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; font-size: 14px; margin-top: 10px; background-color: #fafafa; }
        .btn-report { width: 100%; background-color: #209362; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; margin-top: 8px; font-size: 14px; }
        .btn-group-sub { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn-sub { padding: 10px; border-radius: 8px; border: none; font-weight: bold; font-size: 13px; text-decoration: none; text-align: center; display: flex; align-items: center; justify-content: center; }
        .btn-line { background-color: #06C755; color: white; }
        .btn-map { background-color: #f1f3f4; color: #333; }
        #loading { text-align: center; padding: 30px; font-weight: bold; color: #7f8c8d; }
    </style>
</head>
<body>
    <div class="header">🏥 健檢行動協調中心</div>
    <div class="alert-box">🚨 必帶居留證正本 + 健保卡</div>
    <div class="container"><div id="card-container"><div id="loading">讀取排程中... ⏳</div></div></div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbzMf5u2CMRAOl8G51kzxDXcImcsdHC89sRMNO2xPfA_IJMxE8XbSAHG_13YrYivlYpf/exec';

        async function fetchData() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                const container = document.getElementById('card-container');
                container.innerHTML = '';

                data.forEach(item => {
                    if(item['狀態 (未完成/已完成)'] === '已完成') return;

                    // 直接使用後台傳來的時間字串
                    const displayTime = item['接送日及時間'] || '-';

                    // 製作包含【完整手機資訊】的 LINE 分享訊息
                    const lineMsg = encodeURIComponent(
                        `【健檢通知】\n` +
                        `移工：${item['移工姓名'] || '-'}\n` +
                        `工人手機：${item['工人手機'] || '-'}\n` +
                        `雇主：${item['雇主'] || '-'}\n` +
                        `雇主手機：${item['雇主手機'] || '-'}\n` +
                        `公司：${item['公司名稱'] || '-'}\n` +
                        `時間：${displayTime}\n` +
                        `地址：${item['接送地址'] || '-'}\n` +
                        `請交代移工帶居留證正本+健保卡。`
                    );

                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <h3>👤 ${item['移工姓名']}</h3>
                        <div class="info-row"><div class="label">🏢 公司名稱</div><div class="value">${item['公司名稱'] || '-'}</div></div>
                        <div class="info-row"><div class="label">👤 雇主名稱</div><div class="value">${item['雇主'] || '-'}</div></div>
                        <div class="info-row"><div class="label">⏰ 接送時間</div><div class="value" style="color:red; font-weight:bold;">${displayTime}</div></div>
                        <div class="info-row"><div class="label">📍 接送地址</div><div class="value">${item['接送地址'] || '-'}</div></div>
                        <div class="info-row"><div class="label">🚌 司機電話</div><div class="value">${item['司機姓名/電話'] || '未指派'}</div></div>
                        
                        <hr style="border:0; border-top:1px solid #eee; margin:15px 0;">
                        
                        <div style="font-size:13px; color:#7f8c8d; font-weight:bold;">📍 更新進度：</div>
                        <select class="status-select" id="sel-${item['移工姓名']}">
                            <option value="">-- 點此選擇狀態 --</option>
                            <option value="1.已通知(翻譯/業務)" ${item['目前狀態']=='1.已通知(翻譯/業務)'?'selected':''}>1.已通知(翻譯/業務)</option>
                            <option value="2.已聯絡司機" ${item['目前狀態']=='2.已聯絡司機'?'selected':''}>2.已聯絡司機</option>
                            <option value="3.已上車" ${item['目前狀態']=='3.已上車'?'selected':''}>3.已上車</option>
                            <option value="4.體檢中" ${item['目前狀態']=='4.體檢中'?'selected':''}>4.體檢中</option>
                            <option value="5.已完成" ${item['目前狀態']=='5.已完成'?'selected':''}>5.已完成</option>
                        </select>
                        <button class="btn-report" onclick="doUpdate('${item['移工姓名']}')">送出回報</button>

                        <div class="btn-group-sub">
                            <a href="https://line.me/R/share?text=${lineMsg}" class="btn-sub btn-line">💬 LINE 通知</a>
                            <button class="btn-sub btn-map" onclick="window.open('http://googleusercontent.com/maps.google.com/6{encodeURIComponent(item['接送地址'])}')">🗺️ 導航</button>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (e) { console.error(e); }
        }

        async function doUpdate(name) {
            const status = document.getElementById(`sel-${name}`).value;
            if(!status) return alert('請選擇狀態！');
            if(!confirm(`更新「${name}」為 ${status}？`)) return;

            document.getElementById('card-container').innerHTML = '<div id="loading">更新 Excel 中... 🚀</div>';
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ name: name, status: status })
                });
                alert('回報成功！');
                setTimeout(fetchData, 1000);
            } catch (e) { alert('更新失敗！'); fetchData(); }
        }
        fetchData();
    </script>
</body>
</html>
